name: ELO Benchmark between PR and base branch
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

jobs:
  build-base:
    if: contains(github.event.pull_request.labels.*.name, 'run-benchmark')
    runs-on: self-hosted
    container: heofthetea/thunfischsdk:latest-arm
    steps:

      - name: Checkout PR (current)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: pr

      - name: Fetch base branch (shallow)
        working-directory: pr
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1

      - name: Prepare worktree for base branch
        working-directory: pr
        run: |
          git worktree add -f ../base origin/${{ github.base_ref }}
          git worktree list

      - name: Cache cargo (base branch)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('base/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Build base branch binary
        working-directory: base
        run: |
          cargo build --locked --release
          mv target/release/thunfisch target/release/previous

      - name: Upload base branch binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: thunfisch-previous
          path: base/target/release/previous
          retention-days: 1

  build-current:
    if: contains(github.event.pull_request.labels.*.name, 'run-benchmark')
    runs-on: self-hosted
    container: heofthetea/thunfischsdk:latest-arm
    steps:
      - name: Checkout PR (current)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache cargo (PR)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Build PR binary
        run: |
          cargo build --locked --release
          mv target/release/thunfisch target/release/current

      - name: Upload PR binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: thunfisch-current
          path: target/release/current
          retention-days: 1

  benchmark:
    needs: [build-base, build-current]
    runs-on: self-hosted
    container: heofthetea/thunfischsdk:latest-arm
    permissions:
      pull-requests: write
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout PR for opening book
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: thunfisch-*
          path: ./testing/
          merge-multiple: true

      - name: Verify binaries
        run: |
          ls -la ./testing/
          chmod +x ./testing/previous ./testing/current
      - name: Verify fastchess installation
        run: fastchess --version

      - name: Run SPRT
        run: |
          fastchess \
            -engine cmd=./testing/current name=dev \
            -engine cmd=./testing/previous name=base \
            -each proto=uci tc=8+0.08 \
            -concurrency 2 \
            -rounds 5000 \
            -repeat \
            -recover \
            -openings file=./testing/8moves_v3.pgn format=pgn order=random \
            -pgnout file=./testing/games.pgn \
            -sprt elo0=0 elo1=10 alpha=0.05 beta=0.05 \
            | tee benchmark_summary.txt 2>&1

      - name: Extract benchmark summary
        if: github.event_name == 'pull_request'
        run: tail -n 10 benchmark_summary.txt > benchmark_for_comment.txt

      - name: Post Benchmark Results to PR
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v3
        with:
          file-path: benchmark_for_comment.txt
      - name: Export PGN file
        uses: actions/upload-artifact@v4
        with:
            path: testing/games.pgn
            name: pgn
            retention-days: 30
